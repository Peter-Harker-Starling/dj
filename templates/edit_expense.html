{% extends 'base.html' %}

{% block title %}編輯費用{% endblock %}

{% block content %}
    <h1>編輯費用</h1>

    <form method="post">
        {% csrf_token %}

        <label for="expense_date">日期</label>
        <input type="date" id="expense_date" name="expense_date"
               value="{{ expense.expense_date|date:'Y-m-d' }}" required>

        <label for="item">項目</label>
        <input type="text" id="item" name="item"
               value="{{ expense.item }}" required>

        <label for="amount">金額</label>
        <input type="number" id="amount" name="amount" min="0" step="0.01"
               value="{{ expense.amount }}" required>

        <label for="category">分類</label>
        <select id="category" name="category">
            {% for value, label in expense.CATEGORIES %}
                <option value="{{ value }}" {% if expense.category == value %}selected{% endif %}>
                    {{ label }}
                </option>
            {% endfor %}
        </select>

        <button type="submit" class="btn btn-primary">儲存</button>
    </form>

    <p><a href="{% url 'expense_list' %}">← 取消</a></p>
{% endblock %}
