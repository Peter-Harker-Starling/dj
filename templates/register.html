{% extends 'base.html' %}

{% block title %}註冊{% endblock %}

{% block content %}
    <h1>註冊帳號</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">註冊</button>
    </form>

    <p>已有帳號？<a href="{% url 'login' %}">登入</a></p>
{% endblock %}
