{% load static %}
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}記帳本{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="message {{ message.tags }}" id="django-message">{{ message }}</div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>
    {% block scripts %}
    {% endblock %}
    <script>
        const msg = document.getElementById('django-message');
        if (msg) {
            setTimeout(() => {
                msg.style.transition = 'opacity 0.5s ease'; // 設定「透明度變化的動畫」
                msg.style.opacity = '0'; // 把透明度變成 0（淡出）
                setTimeout(() => msg.remove(), 500); // 等 0.5 秒（動畫跑完）後把這個元素從 DOM 裡面刪掉
            }, 3000); // 3 秒 (3000 毫秒) 後開始淡出
        }
    </script>
</body>
</html>
